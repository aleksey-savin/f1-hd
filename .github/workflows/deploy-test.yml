name: Deploy to Test Environment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Install dependencies
        run: |
          cd backend && pnpm install --frozen-lockfile
          cd ../frontend && pnpm install --frozen-lockfile
          cd ../telegram-bot && pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          cd backend && pnpm test --if-present
          cd ../frontend && pnpm test --if-present
          cd ../telegram-bot && pnpm test --if-present

      - name: Build applications
        run: |
          cd frontend && pnpm run build

      - name: Stop existing services
        run: |
          docker compose -f compose.prod.yml down || true

      - name: Clean up Docker resources
        run: |
          docker system prune -f || true
          docker builder prune -f || true

      - name: Copy production environment
        run: |
          cp .env.prod .env

      - name: Build and start services
        run: |
          set -e
          echo "Building services..."
          DOCKER_BUILDKIT=1 docker compose -f compose.prod.yml build --no-cache --progress=plain
          echo "Starting services..."
          docker compose -f compose.prod.yml up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          sleep 30

      - name: Health check
        run: |
          echo "Performing health check..."
          for i in {1..10}; do
            if curl -f http://localhost/health; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          docker compose -f compose.prod.yml logs
          exit 1

      - name: Show deployment status
        run: |
          docker compose -f compose.prod.yml ps

      - name: Show logs on failure
        if: failure()
        run: |
          echo "Showing container logs..."
          docker compose -f compose.prod.yml logs --tail=50

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment to test environment successful!"
            echo "🚀 Application is running at http://localhost"
          else
            echo "❌ Deployment to test environment failed!"
            echo "📋 Check the logs above for details"
          fi
